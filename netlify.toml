# Alert API routes (must be before the general /api/* rule)
[[redirects]]
  from = "/api/alert-*"
  to = "/.netlify/functions/alert-:splat"
  status = 200
  force = true

# General API routes: /api/me → api-me, /api/profile → api-profile, etc.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api-:splat"
  status = 200
  force = true

# All other routes -> landing page (keep last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
