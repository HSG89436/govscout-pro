[build]
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

[functions."run-alerts"]
  schedule = "0 9 * * *"

# App route must come BEFORE the wildcard
[[redirects]]
  from = "/app"
  to = "/fedscout5.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/fedscout5.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

