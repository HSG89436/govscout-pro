<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GovScout.pro</title>
    <meta
      name="description"
      content="GovScout.pro helps small businesses find and act on federal contracting opportunities."
    >
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        color: #172033;
        background: #f7f8fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(920px, calc(100% - 32px));
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(40px, 8vw, 76px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        max-width: 680px;
        margin: 0;
        font-size: 20px;
        line-height: 1.5;
        color: #3b475f;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
        color: #075f46;
        font-size: 15px;
        font-weight: 700;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #10b981;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="status"><span class="dot"></span>Foundation ready</div>
      <h1>GovScout.pro</h1>
      <p>
        AI-powered federal contracting intelligence for small businesses.
        This repository is now prepared for GitHub, Netlify deployment, and
        coordinated AI-assisted development.
      </p>
    </main>
  </body>
</html>
